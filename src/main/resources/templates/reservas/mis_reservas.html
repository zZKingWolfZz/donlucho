<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Reservas | Hotel Don Lucho</title>
    <link rel="shortcut icon" th:href="@{/images/favicon.png}" type="image/png">
    <link rel="icon" type="image/png" sizes="32x32" th:href="@{/images/favicon.png}">
    <link rel="icon" type="image/png" sizes="16x16" th:href="@{/images/favicon.png}">
    <link rel="apple-touch-icon" th:href="@{/images/favicon.png}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="reservas-container">
    <div class="auth-container">
        <div class="auth-image">
            <div class="auth-quote">
                <h2>Tus Experiencias</h2>
                <p>Revisa el historial de tus estancias y prepárate para tu próxima visita a Don Lucho.</p>
            </div>
        </div>

        <div class="auth-form-container">
            <div class="auth-header">
                <a th:href="@{/}" class="logo-text">DON LUCHO</a>
                <h3>Mis Reservas</h3>
                <p>Historial de tus estancias</p>
            </div>

            <div th:if="${success != null}" class="success-message">
                <span th:text="${success}"></span>
            </div>

            <div th:if="${#lists.isEmpty(reservas)}" class="no-reservas">
                <p>No tienes reservas aún.</p>
                <a th:href="@{/reservar/reservas}" style="display: inline-block; margin-top: 0.5rem;">Haz tu primera reserva</a>
            </div>
            
            <div th:unless="${#lists.isEmpty(reservas)}" class="reservas-list">
                <div th:each="reserva : ${reservas}" class="reserva-item">
                    <div class="reserva-header">
                        <h3>Reserva #<span th:text="${reserva.idReserva}"></span></h3>
                        <span class="reserva-status" th:text="${#strings.capitalize(reserva.estado)}"></span>
                    </div>
                    <div class="reserva-details">
                        <p><strong>Entrada:</strong> <span th:text="${#temporals.format(reserva.fechaEntrada, 'dd/MM/yyyy')}"></span></p>
                        <p><strong>Salida:</strong> <span th:text="${#temporals.format(reserva.fechaSalida, 'dd/MM/yyyy')}"></span></p>
                        <p><strong>Huéspedes:</strong> <span th:text="${reserva.cantidadAdultos}"></span> Ad, <span th:text="${reserva.cantidadNinos}"></span> Ni</p>
                        <p><strong>Sede:</strong> <span th:text="${reserva.nombre_sede}"></span></p>
                        <p><strong>Habitación:</strong> <span th:text="${reserva.numero_habitacion} ?: 'Asignada al llegar'"></span></p>
                    </div>
                    <div class="reserva-actions" style="margin-top: 1rem; text-align: right;">
                        <form th:if="${reserva.estado != 'cancelada' && reserva.estado != 'finalizada'}" onsubmit="return confirm('¿Estás seguro de que deseas cancelar esta reserva?');">
                            <input type="hidden" name="id_reserva" th:value="${reserva.idReserva}">
                            <button type="submit" class="btn-auth" style="background-color: transparent; border: 1px solid #e74c3c; color: #e74c3c; padding: 0.5rem 1rem; font-size: 0.85rem; width: auto;">
                                Cancelar Reserva
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="form-footer">
                <a th:href="@{/}">Volver al Inicio</a>
            </div>
        </div>
    </div>
    
    <script th:inline="javascript">
        document.addEventListener('DOMContentLoaded', function() {
            const forms = document.querySelectorAll('form');
            forms.forEach(form => {
                form.addEventListener('submit', function(e) {
                    e.preventDefault();
                    const idReserva = new FormData(this).get('id_reserva');
                    
                    fetch('/api/cancelar-reserva', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/x-www-form-urlencoded'
                        },
                        body: `id_reserva=${encodeURIComponent(idReserva)}`
                    })
                    .then(response => response.json())
                    .then(data => {
                        if (data.success) {
                            window.location.href = '/reservar/mis_reservas?success=Reserva cancelada correctamente';
                        } else {
                            alert(data.message);
                        }
                    })
                    .catch(error => {
                        alert('Error al cancelar la reserva');
                    });
                });
            });
        });
    </script>
</body>
</html>
