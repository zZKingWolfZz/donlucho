<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta | Hotel Don Lucho</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="shortcut icon" th:href="@{/utiles/images/favicon.png}" type="image/png">
    <link rel="icon" type="image/png" sizes="32x32" th:href="@{/utiles/images/favicon.png}">
    <link rel="icon" type="image/png" sizes="16x16" th:href="@{/utiles/images/favicon.png}">
    <link rel="apple-touch-icon" th:href="@{/utiles/images/favicon.png}">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-image">
            <div class="auth-quote">
                <h2>Únete a Nosotros</h2>
                <p>Crea tu cuenta para gestionar tus reservas, acceder a ofertas exclusivas y vivir la experiencia Don Lucho al máximo.</p>
            </div>
        </div>
        <div class="auth-form-container">
            <div class="auth-header">
                <a th:href="@{/}" class="logo-text">DON LUCHO</a>
                <h3>Crear Cuenta</h3>
                <p>¿Ya tienes una cuenta? <a th:href="@{/login}">Inicia Sesión</a></p>
            </div>
            <div id="registerError" class="error-message"></div>
            <form id="registerForm">
                <input type="hidden" name="action" value="register">
                <div class="form-group">
                    <label for="dni">DNI / Pasaporte</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="dni" name="dni" class="form-control" placeholder="12345678" required>
                        <button type="button" id="btn-buscar-dni" class="btn-auth" style="width: auto; margin: 0;">Buscar</button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="nombre">Nombre Completo</label>
                    <input type="text" id="nombre" name="nombre" class="form-control" placeholder="Juan Pérez" readonly required>
                </div>
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="nombre@ejemplo.com" required>
                </div>
                <div class="form-group">
                    <label for="telefono">Teléfono</label>
                    <input type="tel" id="telefono" name="telefono" class="form-control" placeholder="+51 999 999 999">
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirmar Contraseña</label>
                    <input type="password" id="confirm_password" name="confirm_password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-auth">REGISTRARSE</button>
            </form>
        </div>
    </div>
    <script>
        document.getElementById('btn-buscar-dni').addEventListener('click', function() {
            const dniInput = document.getElementById('dni');
            const dni = dniInput.value;
            const errorDiv = document.getElementById('registerError');
            if (dni.length < 8) {
                errorDiv.innerText = 'El DNI debe tener al menos 8 dígitos';
                errorDiv.style.display = 'block';
                return;
            }
            const originalText = this.innerText;
            this.innerText = 'Buscando...';
            this.disabled = true;
            errorDiv.style.display = 'none';
            // Points to Java endpoint
            fetch('/api/consultar_dni', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: 'dni=' + encodeURIComponent(dni)
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    const nombreInput = document.getElementById('nombre');
                    const nombres = data.nombres || '';
                    const apellidos = `${data.apellidoPaterno || ''} ${data.apellidoMaterno || ''}`.trim();
                    nombreInput.value = `${nombres} ${apellidos}`.trim();
                } else {
                    errorDiv.innerText = data.message || 'No se encontró el DNI.';
                    errorDiv.style.display = 'block';
                }
            })
            .catch(error => {
                console.error('Error:', error);
                errorDiv.innerText = 'Error al consultar RENIEC.';
                errorDiv.style.display = 'block';
            })
            .finally(() => {
                this.innerText = originalText;
                this.disabled = false;
            });
        });
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = this.querySelector('button');
            const errorDiv = document.getElementById('registerError');
            const originalText = btn.innerText;
            btn.disabled = true;
            btn.innerText = 'REGISTRANDO...';
            errorDiv.style.display = 'none';
            const password = document.getElementById('password').value;
            const telefono = document.getElementById('telefono').value;
            const passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{8,}$/;
            const phoneRegex = /^9[0-9]{8}$/;
            if (telefono && !phoneRegex.test(telefono)) {
                errorDiv.innerText = 'El teléfono debe tener 9 dígitos y empezar con 9';
                errorDiv.style.display = 'block';
                btn.disabled = false;
                btn.innerText = originalText;
                return;
            }
            if (!passwordRegex.test(password)) {
                errorDiv.innerText = 'La contraseña debe tener al menos 8 caracteres, una mayúscula, una minúscula, un número y un carácter especial.';
                errorDiv.style.display = 'block';
                btn.disabled = false;
                btn.innerText = originalText;
                return;
            }
            try {
                const formData = new FormData(this);
                // Points to Java register endpoint
                const response = await fetch('/api/register', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                if (data.success) {
                    window.location.href = data.redirect;
                } else {
                    errorDiv.innerText = data.message;
                    errorDiv.style.display = 'block';
                    btn.disabled = false;
                    btn.innerText = originalText;
                }
            } catch (error) {
                console.error('Error:', error);
                errorDiv.innerText = 'Error de conexión. Intente nuevamente.';
                errorDiv.style.display = 'block';
                btn.disabled = false;
                btn.innerText = originalText;
            }
        });
    </script>
</body>
</html>
