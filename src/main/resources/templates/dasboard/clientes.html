<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes - Panel de Administración</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="shortcut icon" th:href="@{/utiles/images/favicon.png}" type="image/png">
    <link rel="icon" type="image/png" sizes="32x32" th:href="@{/utiles/images/favicon.png}">
    <link rel="icon" type="image/png" sizes="16x16" th:href="@{/utiles/images/favicon.png}">
    <link rel="apple-touch-icon" th:href="@{/utiles/images/favicon.png}">
</head>
<body>
    <!-- Top Navbar -->
    <nav class="nav">
        <div class="nav_logo">
            <a th:href="@{/}">
                <h2>DON LUCHO</h2>
            </a>
        </div>
        <ul class="nav-links">
             <li><a th:href="@{/}">Inicio</a></li>
             <li><a th:href="@{/dashboard}">Resumen</a></li>
             <li><a th:href="@{/reservas}">Reservas</a></li>
             <li><a th:href="@{/clientes}" class="active">Clientes</a></li>
             <li><a th:href="@{/habitaciones}">Habitaciones</a></li>
             <li><a th:href="@{/miembros}">Miembros</a></li>
             <li><a th:href="@{/administradores}">Admin</a></li>
             <li><a th:href="@{/logout}"><input type="button" value="Cerrar Sesión" id="auth-button"></a></li>
        </ul>
        <div class="menu-toggle">
            <img th:src="@{/utiles/images/barra.png}" class="nav_img" alt="menu">
        </div>
    </nav>
    <div class="dashboard-container">
        <main class="main-content">
            <div class="welcome-section">
                <h1>Gestión de clientes</h1>
                <div class="admin-toolbar">
                    <form method="GET" th:action="@{/clientes}" class="admin-filter-form">
                        <div class="search-group">
                            <input type="text" name="search" placeholder="Buscar por..." th:value="${param.search}" class="form-control" onchange="this.form.submit()">
                        </div>
                        <a th:if="${param.search != null}" th:href="@{/clientes}" class="btn-secondary btn-sm">X</a>
                        <a th:href="@{/clientes/agregar}" class="btn-primary">
                            REGISTRAR NUEVO CLIENTE
                        </a>
                    </form>
                </div>
            </div>
            <div th:if="${error != null}" style="background: rgba(231, 76, 60, 0.1); color: #e74c3c; padding: 1rem; border-radius: 4px; margin-bottom: 1rem;">
                <span th:text="${error}"></span>
            </div>
            <div th:if="${success != null}" style="background: rgba(46, 204, 113, 0.1); color: #2ecc71; padding: 1rem; border-radius: 4px; margin-bottom: 1rem;">
                <span th:text="${success}"></span>
            </div>
            <th:block th:if="${#lists.isEmpty(clientes)}">
                <div class="welcome-section" style="background: transparent; border: none; box-shadow: none;">
                    <h3>No hay clientes registrados</h3>
                    <p>Aún no se han registrado clientes presenciales.</p>
                </div>
            </th:block>
            <th:block th:unless="${#lists.isEmpty(clientes)}">
                <div class="custom-table-container">
                    <div class="table-responsive">
                        <table class="custom-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Nombres</th>
                                    <th>Apellidos</th>
                                    <th>DNI</th>
                                    <th>Teléfono</th>
                                    <th>Email</th>
                                    <th>Fecha Registro</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="cliente : ${clientes}">
                                    <td data-label="ID" th:text="${cliente.idCliente}"></td>
                                    <td data-label="Nombres" class="mobile-name">
                                        <span th:text="${cliente.nombres}"></span>
                                        <i class="fas fa-chevron-down mobile-expand-icon"></i>
                                    </td>
                                    <td data-label="Apellidos" th:text="${cliente.apellidos}"></td>
                                    <td data-label="DNI" th:text="${cliente.dni}"></td>
                                    <td data-label="Teléfono" th:text="${cliente.telefono != null ? cliente.telefono : '-'}"></td>
                                    <td data-label="Email" th:text="${cliente.email != null ? cliente.email : '-'}"></td>
                                    <td data-label="Fecha Registro" th:text="${cliente.fechaRegistro != null ? #temporals.format(cliente.fechaRegistro, 'dd/MM/yyyy') : ''}"></td>
                                    <td data-label="Acciones">
                                        <div style="display: flex; gap: 0.5rem; justify-content: center;">
                                            <a th:href="@{/clientes/editar/{id}(id=${cliente.idCliente})}" title="Editar" style="color: #3498db; font-size: 1.1rem;">
                                                <i class="fas fa-edit"></i>
                                            </a>
                                            <form method="POST" th:action="@{/clientes}" onsubmit="return confirm('¿Estás seguro de eliminar este cliente?');" style="display:inline;">
                                                <input type="hidden" name="action" value="eliminar">
                                                <input type="hidden" name="id_cliente" th:value="${cliente.idCliente}">
                                                <button type="submit" title="Eliminar" style="background: none; border: none; cursor: pointer; color: #e74c3c; font-size: 1.1rem;">
                                                    <i class="fas fa-trash-alt"></i>
                                                </button>
                                            </form>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </th:block>
        </main>
    </div>
    <script th:src="@{/js/script.js}"></script>
</body>
</html>
