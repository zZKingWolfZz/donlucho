<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar Administrador - Hotel Don Lucho</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="shortcut icon" th:href="@{/utiles/images/favicon.png}" type="image/png">
    <link rel="icon" type="image/png" sizes="32x32" th:href="@{/utiles/images/favicon.png}">
    <link rel="icon" type="image/png" sizes="16x16" th:href="@{/utiles/images/favicon.png}">
    <link rel="apple-touch-icon" th:href="@{/utiles/images/favicon.png}">
</head>
<body>
    <!-- Top Navbar -->
    <nav class="nav">
        <div class="nav_logo">
            <a th:href="@{/}">
                <h2>DON LUCHO</h2>
            </a>
        </div>
        <ul class="nav-links">
             <li><a th:href="@{/}">Inicio</a></li>
             <li><a th:href="@{/dashboard}">Resumen</a></li>
             <li><a th:href="@{/reservas}">Reservas</a></li>
             <li><a th:href="@{/clientes}">Clientes</a></li>
             <li><a th:href="@{/habitaciones}">Habitaciones</a></li>
             <li><a th:href="@{/miembros}">Miembros</a></li>
             <li><a th:href="@{/administradores}" class="active">Admin</a></li>
             <li><a th:href="@{/logout}"><input type="button" value="Cerrar Sesión" id="auth-button"></a></li>
        </ul>
        <div class="menu-toggle">
            <img th:src="@{/utiles/images/barra.png}" class="nav_img" alt="menu">
        </div>
    </nav>
    <div class="dashboard-container">
        <main class="main-content">
            <div class="form-container">
                <h1 style="color: var(--accent-gold); text-align: center; margin-bottom: 2rem; font-family: var(--font-heading);">Agregar Nuevo Administrador</h1>
                <div th:if="${error != null}" style="background: rgba(231, 76, 60, 0.1); color: #e74c3c; padding: 1rem; border-radius: 4px; margin-bottom: 1rem;">
                    <span th:text="${error}"></span>
                </div>
                <div th:if="${success != null}" style="background: rgba(46, 204, 113, 0.1); color: #2ecc71; padding: 1rem; border-radius: 4px; margin-bottom: 1rem;">
                    <span th:text="${success}"></span>
                </div>
                <form method="POST" th:action="@{/agregar_admin}">
                    <div class="form-group">
                        <label for="nombre">Nombre Completo:</label>
                        <input type="text" id="nombre" name="nombre" placeholder="Juan Pérez" required class="form-control">
                    </div>
                    <div class="form-group">
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" placeholder="admin@donlucho.com" required class="form-control">
                    </div>
                    <div class="form-group">
                        <label for="password">Contraseña:</label>
                        <input type="password" id="password" name="password" required class="form-control">
                    </div>
                    <div class="form-group">
                        <label for="confirm_password">Confirmar Contraseña:</label>
                        <input type="password" id="confirm_password" name="confirm_password" required class="form-control">
                    </div>
                    <div class="form-actions" style="display: flex; gap: 1rem; margin-top: 2rem;">
                        <button type="submit" class="btn-primary">Agregar Administrador</button>
                        <a th:href="@{/administradores}" class="btn-secondary" style="text-align: center; text-decoration: none;">Volver</a>
                    </div>
                </form>
            </div>
        </main>
    </div>
    <script th:src="@{/js/script.js}"></script>
</body>
</html>
