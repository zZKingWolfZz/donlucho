<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Habitaciones</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="shortcut icon" th:href="@{/utiles/images/favicon.png}" type="image/png">
</head>
<body>
    <!-- Top Navbar -->
    <nav class="nav">
        <div class="nav_logo">
            <a th:href="@{/}">
                <h2>DON LUCHO</h2>
            </a>
        </div>
        <ul class="nav-links">
             <li><a th:href="@{/}">Inicio</a></li>
             <li><a th:href="@{/dashboard}">Resumen</a></li>
             <li><a th:href="@{/reservas}">Reservas</a></li>
             <li><a th:href="@{/clientes}">Clientes</a></li>
             <li><a th:href="@{/habitaciones}" class="active">Habitaciones</a></li>
             <li><a th:href="@{/miembros}">Miembros</a></li>
             <li><a th:href="@{/administradores}">Admin</a></li>
             <li><a th:href="@{/logout}"><input type="button" value="Cerrar Sesión" id="auth-button"></a></li>
        </ul>
        <div class="menu-toggle">
            <img th:src="@{/utiles/images/barra.png}" class="nav_img" alt="menu">
        </div>
    </nav>
    <div class="dashboard-container">
        <main class="main-content">
            <div class="welcome-section" style="margin-bottom: 1rem;">
                <h1>Gestión de Habitaciones</h1>
                <div class="admin-toolbar">
                    <form method="GET" th:action="@{/habitaciones}" class="admin-filter-form">
                        <div class="filter-group">
                            <label for="id_sede">Filtrar por sede:</label>
                            <select name="id_sede" id="id_sede" onchange="this.form.submit()">
                                <option value="">Todas las sedes</option>
                                <option th:each="sede : ${sedes}"
                                        th:value="${sede.idSede}"
                                        th:text="${sede.nombreSede}"
                                        th:selected="${id_sede_seleccionada == sede.idSede}"></option>
                            </select>
                        </div>
                        <a th:if="${id_sede_seleccionada != null}" th:href="@{/habitaciones}" class="btn-secondary btn-sm">x</a>
                        <a th:href="@{/habitaciones/agregar}" class="btn-primary">
                            Agregar Habitación
                        </a>
                    </form>
                </div>
                <div th:if="${success_msg != null}" class="alert success" style="margin-top: 1rem;">
                    <span th:text="${success_msg}"></span>
                </div>
                <div th:if="${error != null}" class="alert error" style="margin-top: 1rem;">
                    <span th:text="${error}"></span>
                </div>
            </div>
            <div class="table-responsive">
                <table class="custom-table">
                    <thead>
                        <tr>
                            <th>Número</th>
                            <th>Tipo</th>
                            <th>Sede</th>
                            <th>Piso</th>
                            <th>Estado</th>
                            <th>Precio</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(habitaciones)}">
                            <td colspan="7" style="text-align: center;">No hay habitaciones registradas.</td>
                        </tr>
                        <tr th:unless="${#lists.isEmpty(habitaciones)}" th:each="habitacion : ${habitaciones}">
                            <td data-label="Número" class="mobile-name">
                                <span><span th:text="${habitacion.numeroHabitacion}"></span></span>
                                <i class="fas fa-chevron-down mobile-expand-icon"></i>
                            </td>
                            <td data-label="Tipo" th:text="${habitacion.nombreTipo}"></td>
                            <td data-label="Sede" th:text="${habitacion.nombreSede}"></td>
                            <td data-label="Piso" th:text="${habitacion.piso}"></td>
                            <td data-label="Estado">
                                <span th:class="'status-badge status-' + ${#strings.toLowerCase(habitacion.estado)}"
                                      th:text="${habitacion.estado}"></span>
                            </td>
                            <td data-label="Precio" th:text="'S/. ' + ${#numbers.formatDecimal(habitacion.precioNoche, 1, 2)}"></td>
                            <td data-label="Acciones">
                                <div style="display: flex; gap: 0.5rem; justify-content: center;">
                                    <a th:href="@{/habitaciones/editar/{id}(id=${habitacion.idHabitacion})}" title="Editar" style="color: #3498db; font-size: 1.1rem;">
                                        <i class="fas fa-edit"></i>
                                    </a>
                                    <form method="POST" th:action="@{/habitaciones}" onsubmit="return confirm('¿Estás seguro de eliminar esta habitación?');" style="display:inline;">
                                        <input type="hidden" name="action" value="eliminar">
                                        <input type="hidden" name="id_habitacion" th:value="${habitacion.idHabitacion}">
                                        <button type="submit" title="Eliminar" style="background: none; border: none; cursor: pointer; color: #e74c3c; font-size: 1.1rem;">
                                            <i class="fas fa-trash-alt"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
    <script th:src="@{/js/script.js}"></script>
</body>
</html>
