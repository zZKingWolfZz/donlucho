<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Cliente - Hotel Don Lucho</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="shortcut icon" th:href="@{/utiles/images/favicon.png}" type="image/png">
    <link rel="icon" type="image/png" sizes="32x32" th:href="@{/utiles/images/favicon.png}">
    <link rel="icon" type="image/png" sizes="16x16" th:href="@{/utiles/images/favicon.png}">
    <link rel="apple-touch-icon" th:href="@{/utiles/images/favicon.png}">
</head>
<body>
    <!-- Top Navbar -->
    <nav class="nav">
        <div class="nav_logo">
            <a th:href="@{/}">
                <h2>DON LUCHO</h2>
            </a>
        </div>
        <ul class="nav-links">
             <li><a th:href="@{/}">Inicio</a></li>
             <li><a th:href="@{/dashboard}">Resumen</a></li>
             <li><a th:href="@{/reservas}">Reservas</a></li>
             <li><a th:href="@{/clientes}" class="active">Clientes</a></li>
             <li><a th:href="@{/habitaciones}">Habitaciones</a></li>
             <li><a th:href="@{/miembros}">Miembros</a></li>
             <li><a th:href="@{/administradores}">Admin</a></li>
             <li><a th:href="@{/logout}"><input type="button" value="Cerrar Sesión" id="auth-button"></a></li>
        </ul>
        <div class="menu-toggle">
            <img th:src="@{/utiles/images/barra.png}" class="nav_img" alt="menu">
        </div>
    </nav>
    <div class="dashboard-container">
        <main class="main-content">
            <div class="form-container">
                <h1 style="color: var(--accent-gold); text-align: center; margin-bottom: 2rem; font-family: var(--font-heading);">Editar Cliente</h1>
                <div th:if="${error != null}" style="background: rgba(231, 76, 60, 0.1); color: #e74c3c; padding: 1rem; border-radius: 4px; margin-bottom: 1rem;">
                    <span th:text="${error}"></span>
                </div>
                <div th:if="${success != null}" style="background: rgba(46, 204, 113, 0.1); color: #2ecc71; padding: 1rem; border-radius: 4px; margin-bottom: 1rem;">
                    <span th:text="${success}"></span>
                </div>
                <form method="POST" th:action="@{/editar_cliente}">
                    <input type="hidden" name="id_cliente" th:value="${cliente.idCliente}">
                    <div class="form-group">
                        <label for="dni">DNI:</label>
                        <div style="display: flex; gap: 0.5rem;">
                            <input type="text" id="dni" name="dni" th:value="${cliente.dni}" required maxlength="8" pattern="[0-9]{8}" title="Debe tener 8 dígitos numéricos" class="form-control">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="nombres">Nombres:</label>
                        <input type="text" id="nombres" name="nombres" th:value="${cliente.nombres}" required class="form-control">
                    </div>
                    <div class="form-group">
                        <label for="apellidos">Apellidos:</label>
                        <input type="text" id="apellidos" name="apellidos" th:value="${cliente.apellidos}" required class="form-control">
                    </div>
                    <div class="form-group">
                        <label for="telefono">Teléfono:</label>
                        <input type="tel" id="telefono" name="telefono" th:value="${cliente.telefono}" class="form-control">
                    </div>
                    <div class="form-group">
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" th:value="${cliente.email}" class="form-control">
                    </div>
                    <div class="form-group">
                        <label for="id_habitacion">Asignar Habitación (Opcional):</label>
                        <select id="id_habitacion" name="id_habitacion" class="form-control">
                            <option value="">-- Ninguna --</option>
                            <option th:each="hab : ${habitaciones}"
                                    th:value="${hab.idHabitacion}"
                                    th:text="${hab.nombreSede + ' - ' + hab.numeroHabitacion}"
                                    th:selected="${cliente.idHabitacion == hab.idHabitacion}"></option>
                        </select>
                        <small style="color: var(--text-muted);">Solo se muestran habitaciones disponibles o la actual.</small>
                    </div>
                    <div class="form-actions" style="margin-top: 2rem;">
                        <button type="submit" class="btn-primary">Guardar Cambios</button>
                        <a th:href="@{/clientes}" class="btn-secondary" style="text-align: center; text-decoration: none;">Cancelar</a>
                    </div>
                </form>
            </div>
        </main>
    </div>
    <script th:src="@{/js/script.js}"></script>
</body>
</html>
