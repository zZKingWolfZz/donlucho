<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Hotel Don Lucho</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="shortcut icon" th:href="@{/utiles/images/favicon.png}" type="image/png">
    <link rel="icon" type="image/png" sizes="32x32" th:href="@{/utiles/images/favicon.png}">
    <link rel="icon" type="image/png" sizes="16x16" th:href="@{/utiles/images/favicon.png}">
    <link rel="apple-touch-icon" th:href="@{/utiles/images/favicon.png}">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-image">
            <div class="auth-quote">
                <h2>Bienvenido a la Excelencia</h2>
                <p>Descubre el confort y la elegancia en el corazón de la ciudad. Tu experiencia inolvidable comienza aquí.</p>
            </div>
        </div>
        <div class="auth-form-container">
            <div class="auth-header">
                <a th:href="@{/}" class="logo-text">DON LUCHO</a>
                <h3>Iniciar Sesión</h3>
                <p>¿No tienes una cuenta? <a th:href="@{/logup}">Regístrate</a></p>
            </div>
            <div id="loginError" class="error-message"></div>
            <form id="loginForm">
                <input type="hidden" name="action" value="login">
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="nombre@ejemplo.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-auth">INGRESAR</button>
                <div class="form-footer">
                    <a href="#">¿Olvidaste tu contraseña?</a>
                </div>
            </form>
        </div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = this.querySelector('button');
            const errorDiv = document.getElementById('loginError');
            const originalText = btn.innerText;
            btn.disabled = true;
            btn.innerText = 'VERIFICANDO...';
            errorDiv.style.display = 'none';
            try {
                const formData = new FormData(this);
                // Points to Java Login Endpoint
                const response = await fetch('/api/login', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                if (data.success) {
                    window.location.href = data.redirect;
                } else {
                    errorDiv.innerText = data.message;
                    errorDiv.style.display = 'block';
                    btn.disabled = false;
                    btn.innerText = originalText;
                }
            } catch (error) {
                console.error('Error:', error);
                errorDiv.innerText = 'Error de conexión. Intente nuevamente.';
                errorDiv.style.display = 'block';
                btn.disabled = false;
                btn.innerText = originalText;
            }
        });
    </script>
</body>
</html>
